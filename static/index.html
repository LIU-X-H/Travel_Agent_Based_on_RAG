<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" href="/favicon.ico" type="image/svg+xml">
<title>旅途小智 - AI 旅行助手</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#f7f4ef; --card:#fff; --text:#2c2416; --sub:#8b7355;
    --accent:#e8811a; --accent2:#2e7d67; --border:#e8dfd3;
    --shadow:0 2px 12px rgba(0,0,0,.05); --radius:16px;
  }
  body{
    font-family:'Segoe UI','Noto Sans SC',system-ui,sans-serif;
    background:linear-gradient(160deg,#f7f4ef,#f0ebe0,#e8dfd3,#f7f4ef);background-attachment:fixed;
    height:100vh; overflow:hidden;
  }
  #app{display:flex;height:100vh;max-width:1200px;margin:0 auto}

  /* ---- Sidebar ---- */
  #sidebar{
    width:280px;min-width:280px;background:rgba(255,255,255,.8);
    backdrop-filter:blur(12px);border-right:1px solid var(--border);
    display:flex;flex-direction:column;z-index:10;
  }
  #sidebar-header{
    padding:16px 16px 10px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
  }
  #sidebar-header .s-logo{
    width:36px;height:36px;border-radius:12px;
    background:linear-gradient(135deg,#e8811a,#d4720d);
    display:flex;align-items:center;justify-content:center;font-size:18px;
  }
  #sidebar-header h2{font-size:16px;color:var(--text);flex:1}
  #new-chat-btn{
    width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accent);
    background:#fff;color:var(--accent);font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.2s;
  }
  #new-chat-btn:hover{background:var(--accent);color:#fff}

  #thread-list{flex:1;overflow-y:auto;padding:8px}
  #thread-list::-webkit-scrollbar{width:4px}
  #thread-list::-webkit-scrollbar-thumb{background:#d4c9b8;border-radius:10px}

  .thread-item{
    padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:4px;
    transition:.15s;position:relative;border:1px solid transparent;
  }
  .thread-item:hover{background:#f5f0e9}
  .thread-item.active{background:#fff4e8;border-color:var(--accent)}
  .thread-item .t-title{font-size:13px;color:var(--text);line-height:1.4;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:28px}
  .thread-item .t-time{font-size:11px;color:var(--sub);margin-top:3px}
  .thread-item .t-del{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    width:24px;height:24px;border-radius:50%;border:none;background:none;
    cursor:pointer;font-size:14px;color:#c4b9a5;display:none;align-items:center;justify-content:center;
  }
  .thread-item:hover .t-del{display:flex}
  .thread-item .t-del:hover{background:#fee;color:#e33}

  /* ---- Main Chat Area ---- */
  #main{
    flex:1;display:flex;flex-direction:column;min-width:0;
  }
  header{
    padding:12px 20px;display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,.6);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);
  }
  header .badge{
    margin-left:auto;padding:5px 12px;border-radius:14px;font-size:11px;font-weight:600;
    background:var(--accent2);color:#fff;
  }
  #messages{
    flex:1;overflow-y:auto;padding:16px 20px;
  }
  #messages::-webkit-scrollbar{width:5px}
  #messages::-webkit-scrollbar-thumb{background:#d4c9b8;border-radius:10px}

  .msg{display:flex;gap:10px;margin-bottom:18px;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}}
  .msg.user{flex-direction:row-reverse}
  .msg .avatar{
    width:32px;height:32px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:15px;
  }
  .msg.ai .avatar{background:#f5f0e8}
  .msg.user .avatar{background:var(--accent);color:#fff}
  .msg .bubble{
    max-width:75%;padding:12px 16px;border-radius:var(--radius);
    line-height:1.6;font-size:14px;word-break:break-word;box-shadow:var(--shadow);
  }
  .msg.ai .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:6px;color:var(--text)}
  .msg.user .bubble{background:var(--accent);border-bottom-right-radius:6px;color:#fff}
  .msg.ai .bubble p{margin:4px 0}
  .msg.ai .bubble strong{color:#c45d0c}
  .msg.ai .bubble ul,.msg.ai .bubble ol{padding-left:18px;margin:4px 0}
  .msg.ai .bubble h1,.msg.ai .bubble h2,.msg.ai .bubble h3{font-size:15px;margin:8px 0 4px}
  .msg.ai .bubble code{background:#ede4d5;padding:2px 6px;border-radius:4px;font-size:13px}
  .msg.ai .bubble pre{background:#2c2416;color:#e8dfd3;padding:10px;border-radius:8px;overflow-x:auto}
  .pdf-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:5px 12px;border-radius:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;cursor:pointer;transition:.2s;font-family:inherit}
  .pdf-btn:hover{background:var(--accent);color:#fff}
  .pdf-btn svg{width:14px;height:14px;fill:currentColor}

  /* Tool card */
  .tool-card{
    display:flex;align-items:center;gap:8px;padding:8px 12px;margin:10px 0;
    border-radius:10px;font-size:12px;
    background:#fef9f0;border:1px solid #f0d8a8;color:#8b5e1a;
    animation:fadeIn .3s ease;
  }
  .tool-card .spinner{
    width:16px;height:16px;border:2px solid #e0c89a;border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .tool-card.done{background:#f0f7f4;border-color:#b8d8c8;color:var(--accent2)}
  .tool-card .ti{flex:1}
  .tool-card .ti .tn{font-weight:600}
  .tool-card .ti .ta{opacity:.65;font-size:11px;margin-top:1px}

  /* Quick chips */
  #chips{display:flex;gap:6px;padding:0 20px 6px;overflow-x:auto;scrollbar-width:none}
  #chips::-webkit-scrollbar{display:none}
  .chip{
    flex-shrink:0;padding:7px 14px;border-radius:18px;font-size:12.5px;
    background:rgba(255,255,255,.55);border:1px solid var(--border);
    cursor:pointer;color:var(--text);white-space:nowrap;transition:.15s;user-select:none;
  }
  .chip:hover{background:#fff;border-color:var(--accent);color:var(--accent)}

  /* Input */
  #input-area{padding:10px 20px 16px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);border-top:1px solid var(--border)}
  #input-box{
    display:flex;align-items:flex-end;gap:8px;background:#fff;
    border-radius:24px;padding:5px 5px 5px 18px;border:1.5px solid var(--border);transition:.2s;
  }
  #input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px rgba(232,129,26,.1)}
  #input-box textarea{
    flex:1;border:none;outline:none;font-size:14px;font-family:inherit;
    resize:none;padding:7px 0;max-height:100px;background:transparent;line-height:1.5;
  }
  #input-box textarea::placeholder{color:#c4b9a5}
  #send-btn{
    width:40px;height:40px;border-radius:50%;border:none;
    background:linear-gradient(135deg,var(--accent),#d4720d);
    color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:.2s;
    display:flex;align-items:center;justify-content:center;
  }
  #send-btn:disabled{background:#ccc;cursor:not-allowed}

  /* Welcome */
  #welcome{text-align:center;padding:60px 20px}
  #welcome .w-icon{font-size:48px;margin-bottom:12px}
  #welcome h2{font-size:22px;margin-bottom:4px}
  #welcome p{color:var(--sub);font-size:13px;max-width:380px;margin:0 auto;line-height:1.6}

  /* Loading dots */
  #loading{display:flex;align-items:center;gap:8px;padding:8px 20px;font-size:13px;color:var(--sub)}
  #loading .dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;animation:bounce 1.4s infinite ease-in-out both;margin-right:3px}
  #loading .dots span:nth-child(1){animation-delay:-.32s}
  #loading .dots span:nth-child(2){animation-delay:-.16s}
  @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

  @media(max-width:768px){
    #sidebar{width:240px;min-width:240px;position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);transition:.3s}
    #sidebar.open{transform:translateX(0)}
    #menu-toggle{display:flex!important}
  }
  #menu-toggle{display:none;width:36px;height:36px;border-radius:10px;border:none;background:var(--card);cursor:pointer;font-size:18px;align-items:center;justify-content:center;border:1px solid var(--border)}
</style>
</head>
<body>
<div id="app">

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="s-logo">&#x2708;</div>
    <h2>对话列表</h2>
    <button id="new-chat-btn" title="新对话">+</button>
  </div>
  <div id="thread-list"></div>
</div>

<!-- Main Chat -->
<div id="main">
  <header>
    <button id="menu-toggle" title="对话列表">&#x2630;</button>
    <span style="font-weight:700;font-size:17px;color:var(--text)">&#x65C5;&#x9014;&#x5C0F;&#x667A;</span>
    <span class="badge">RAG Agent</span>
  </header>

  <div id="messages">
    <div id="welcome">
      <div class="w-icon">&#x1F30D;</div>
      <h2>你好，我是旅途小智</h2>
      <p>我可以帮你推荐景点、查天气、规划行程、推荐美食、换算汇率。试试下面的问题吧！</p>
    </div>
  </div>

  <div id="chips">
    <div class="chip">&#x5317;&#x4EAC;&#x6709;&#x54EA;&#x4E9B;5A&#x666F;&#x70B9;&#xFF1F;</div>
    <div class="chip">&#x676D;&#x5DDE;&#x514D;&#x8D39;&#x666F;&#x70B9;&#x63A8;&#x8350;</div>
    <div class="chip">&#x6210;&#x90FD;&#x706B;&#x9505;&#x54EA;&#x5BB6;&#x597D;&#xFF1F;</div>
    <div class="chip">5000&#x5143;&#x6362;&#x591A;&#x5C11;&#x65E5;&#x5143;</div>
    <div class="chip">&#x660E;&#x5929;&#x676D;&#x5DDE;&#x5929;&#x6C14;</div>
  </div>

  <div id="input-area">
    <div id="input-box">
      <textarea id="user-input" rows="1" placeholder="输入你的旅游问题..." maxlength="2000"></textarea>
      <button id="send-btn" title="发送">&#x2191;</button>
    </div>
  </div>
</div>

</div>

<script>
// ============================================================
const API = '/api/agent/chat';
const THREADS_API = '/api/agent/threads';
let threadId = null;
let _streamTarget = null;

// DOM
const $msgs = document.getElementById('messages');
const $input = document.getElementById('user-input');
const $send  = document.getElementById('send-btn');
const $new   = document.getElementById('new-chat-btn');
const $list  = document.getElementById('thread-list');
const $chips = document.getElementById('chips');
const $menu  = document.getElementById('menu-toggle');
const $side  = document.getElementById('sidebar');

// Helpers
const $=s=>document.querySelector(s); const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
function scroll(){requestAnimationFrame(()=>$msgs.scrollTop=$msgs.scrollHeight)}

// ---- Thread History Loading ----
function saveThread(){
  // 服务端已自动保存，客户端不再缓存
}
async function loadThread(tid){
  threadId=tid;_streamTarget=null;
  $msgs.innerHTML='<div style=text-align:center;padding:40px;color:var(--sub)>加载中...</div>';
  try{
    var r=await fetch(THREADS_API+'/'+encodeURIComponent(tid)+'/messages');
    var d=await r.json();
    $msgs.innerHTML='';
    if(d.messages&&d.messages.length>0){
      d.messages.forEach(function(m){
        if(m.role==='user') addMsg('user',esc(m.content));
        else addMsg('ai', renderMD(m.content), m.content);
      });
    }else{
      loadWelcome();
    }
  }catch(e){console.error(e);loadWelcome()}
  scroll();
}
function timeLabel(ts){const d=new Date(ts*1000);const now=new Date();const diff=now-d;
  if(diff<6e4)return '刚刚';if(diff<36e5)return Math.floor(diff/6e4)+'分钟前';
  if(diff<864e5)return Math.floor(diff/36e5)+'小时前';
  return d.getMonth()+1+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}

// ---- Render Threads ----
async function loadThreads(){
  try{
    const r=await fetch(THREADS_API); const d=await r.json();
    $list.innerHTML='';
    d.threads.forEach(t=>{
      const el=document.createElement('div'); el.className='thread-item';
      if(t.thread_id===threadId) el.classList.add('active');
      el.innerHTML='<div class=t-title>'+esc(t.title)+'</div><div class=t-time>'+timeLabel(t.updated_at)+'</div>';
      const del=document.createElement('button'); del.className='t-del'; del.textContent='x';
      del.onclick=async(e)=>{e.stopPropagation();if(confirm('删除此对话？')){await fetch(THREADS_API+'/'+t.thread_id,{method:'DELETE'});if(threadId===t.thread_id)newChat();loadThreads()}};
      el.appendChild(del);
      el.onclick=()=>switchThread(t.thread_id);
      $list.appendChild(el);
    });
  }catch(e){console.error(e)}
}

function switchThread(tid){
  saveThread();  // 保存当前对话内容
  loadThread(tid);
  loadThreads();
}

function newChat(){
  threadId=null;$msgs.innerHTML='';_streamTarget=null;
  loadWelcome();loadThreads();
}

function loadWelcome(){
  if($msgs.querySelector('#welcome')) return;
  $msgs.innerHTML='<div id=welcome><div class=w-icon>&#x1F30D;</div><h2>你好，我是旅途小智</h2><p>我可以帮你推荐景点、查天气、规划行程、推荐美食、换算汇率。</p></div>';
}

// ---- Messages ----
function addMsg(role, content, rawText){
  const w=document.getElementById('welcome'); if(w) w.remove();
  const div=document.createElement('div'); div.className='msg '+role;
  const bubble=document.createElement('div'); bubble.className='bubble';
  const cdiv=document.createElement('div'); cdiv.className='bubble-content';
  cdiv.innerHTML=content; bubble.appendChild(cdiv);
  if(role==='ai'){
    bubble.dataset.rawText=rawText||'';
    const pdf=document.createElement('button'); pdf.className='pdf-btn';
    pdf.innerHTML='📄 将回答导出为PDF';
    pdf.title='将行程导出为PDF文件';
    pdf.onclick=function(e){e.stopPropagation();downloadPDF(bubble.dataset.rawText)};
    bubble.appendChild(pdf);
  }
  div.innerHTML='<div class=avatar>'+(role==='user'?'&#x1F464;':'&#x2708;')+'</div>';
  div.querySelector('.avatar').after(bubble);
  $msgs.appendChild(div); scroll(); return div;
}

function getStreamTarget(){
  if(!_streamTarget){_streamTarget=addMsg('ai','');_streamTarget=_streamTarget.querySelector('.bubble')}
  return _streamTarget
}

function addToolCard(name,args){
  const w=document.getElementById('welcome'); if(w) w.remove();
  const names={scenic_spot_search:{icon:'&#x1F3EF;',label:'搜索景点'},get_weather:{icon:'&#x2600;',label:'查询天气'},search_food:{icon:'&#x1F372;',label:'搜索美食'},plan_itinerary:{icon:'&#x1F5FA;',label:'规划行程'},exchange_rate:{icon:'&#x1F4B1;',label:'汇率换算'}};
  const n=names[name]||{icon:'&#x1F527;',label:name};
  const c=document.createElement('div');c.className='tool-card';c.id='tool-'+Date.now();
  c.innerHTML='<div class=spinner></div><div style=font-size:17px>'+n.icon+'</div><div class=ti><div class=tn>'+n.label+'</div><div class=ta>'+esc(JSON.stringify(args))+'</div></div>';
  $msgs.appendChild(c);scroll();return c
}

function finishTool(){var c=$msgs.querySelector('.tool-card:not(.done)');if(!c)return;c.classList.add('done');var s=c.querySelector('.spinner');if(s)s.remove()}

function renderMD(text){
  let out=esc(text);
  out=out.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  out=out.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  out=out.replace(/`([^`]+)`/g,'<code>$1</code>');
  out=out.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  out=out.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  out=out.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  out=out.replace(/^- (.+)$/gm,'<li>$1</li>');
  out=out.replace(/\n\n/g,'</p><p>');out=out.replace(/\n/g,'<br>');
  out='<p>'+out+'</p>';out=out.replace(/<p><\/p>/g,'');
  return out
}

function downloadPDF(text){
  if(!text||!text.trim()){alert('暂无内容可导出');return}
  const isItinerary=text.includes('━━━')||text.includes('行程计划')||text.includes('小贴士');
  const title=isItinerary?'行程规划':'旅行问答';
  const dateStr=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
  const w=window.open('','_blank');
  if(!w){alert('请允许弹出窗口以导出PDF');return}
  w.document.write('<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><title>旅途小智 - '+title+'</title><style>');
  w.document.write('*{margin:0;padding:0;box-sizing:border-box}');
  w.document.write('body{font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;color:#2c2416;padding:0;background:#f7f4ef}');
  w.document.write('.page{max-width:720px;margin:0 auto;padding:50px 40px;background:#fff;min-height:100vh}');
  w.document.write('.logo{font-size:28px;margin-bottom:4px}');
  w.document.write('h1{font-size:22px;color:#e8811a;margin-bottom:4px}');
  w.document.write('.meta{color:#8b7355;font-size:13px;margin-bottom:20px;border-bottom:2px solid #e8811a;padding-bottom:12px}');
  w.document.write('.content{line-height:1.9;font-size:14px;white-space:pre-wrap;word-break:break-word}');
  w.document.write('.content strong{color:#c45d0c}');
  w.document.write('.footer{margin-top:30px;padding-top:14px;border-top:1px solid #e8dfd3;color:#8b7355;font-size:12px;text-align:center}');
  w.document.write('@media print{body{background:#fff}.page{padding:30px 20px}}');
  w.document.write('</style></head><body><div class=page>');
  w.document.write('<div class=logo>&#x2708;</div><h1>旅途小智 · '+title+'</h1>');
  w.document.write('<div class=meta>生成日期：'+dateStr+'</div>');
  w.document.write('<div class=content>'+esc(text).replace(/\n/g,'<br>')+'</div>');
  w.document.write('<div class=footer>由「旅途小智」AI 旅行助手生成  ·  数据来源：旅游景点知识库</div>');
  w.document.write('</div><script>window.onload=function(){setTimeout(function(){window.print()},300)}<\/script>');
  w.document.write('</body></html>');
  w.document.close()
}

// ---- Send Message ----
async function sendMessage(text){
  $send.disabled=true;addMsg('user',esc(text));_streamTarget=null;
  const ld=document.createElement('div');ld.id='loading';ld.innerHTML='<div class=dots><span></span><span></span><span></span></div>思考中...';
  $msgs.appendChild(ld);scroll();
  let fullAnswer='';
  try{
    const resp=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,thread_id:threadId})});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const reader=resp.body.getReader(),decoder=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});
      const parts=buf.split('\n\n');buf=parts.pop();
      for(const p of parts){
        if(!p.startsWith('event:'))continue;
        const lines=p.split('\n');const ev=lines[0].replace('event:','').trim();
        const dl=lines.find(l=>l.startsWith('data:'));if(!dl)continue;
        const data=JSON.parse(dl.replace('data:','').trim());
        switch(ev){
          case'tool_start':addToolCard(data.name,data.input);break;
          case'tool_end':finishTool();break;
          case'token':
            if(ld.parentNode)ld.remove();fullAnswer+=data.text;
            const st=getStreamTarget();
            const cdiv=st.querySelector('.bubble-content')||st;
            cdiv.innerHTML=renderMD(fullAnswer);
            st.dataset.rawText=fullAnswer;scroll();break;
          case'error':if(ld.parentNode)ld.remove();addMsg('ai','&#x26A0; '+esc(data.error));break;
          case'done':
            if(ld.parentNode)ld.remove();threadId=data.thread_id||threadId;
            loadThreads();break;
        }
      }
    }
  }catch(e){if(ld.parentNode)ld.remove();addMsg('ai','&#x26A0; 连接失败: '+esc(e.message))}
  if(ld.parentNode)ld.remove();$send.disabled=false;$input.focus()
}

// Events
$send.onclick=()=>{const t=$input.value.trim();if(!t||$send.disabled)return;$input.value='';$input.style.height='auto';sendMessage(t)}
$input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$send.click()}}
$input.oninput=()=>{$input.style.height='auto';$input.style.height=Math.min($input.scrollHeight,100)+'px'}
$new.onclick=newChat;
$menu.onclick=()=>$side.classList.toggle('open');
$chips.onclick=e=>{if(e.target.classList.contains('chip')){$input.value=e.target.textContent;$send.click()}}
